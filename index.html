<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOBI TEACHES - Motivational Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: rgba(15, 15, 20, 0.85);
            --secondary-bg: rgba(30, 30, 40, 0.7);
            --accent: #d4a574;
            --accent-light: #e8c9a0;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --overlay-dark: rgba(0, 0, 0, 0.5);
            --success: #4ade80;
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0f;
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

       
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .video-placeholder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            animation: gradientShift 20s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-dark);
            z-index: -1;
            pointer-events: none;
        }

        .overlay.controlled {
            background: rgba(0, 0, 0, var(--overlay-opacity, 0.5));
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 3rem;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
            transition: var(--transition-smooth);
        }

        .header.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.4em;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .mode-buttons {
            display: flex;
            gap: 1rem;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }

    
        .quote-container {
            max-width: 900px;
            text-align: center;
            padding: 3rem;
            opacity: 1;
            transform: translateY(0);
            transition: var(--transition-smooth);
        }

        .quote-container.fade-out {
            opacity: 0;
            transform: translateY(-20px);
        }

        .quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 2rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .quote-author {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--accent-light);
            text-transform: uppercase;
        }

     
        .progress-indicator {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 3rem;
            letter-spacing: 0.1em;
        }

   
        .track-indicator {
            position: fixed;
            top: 5rem;
            right: 2rem;
            background: var(--secondary-bg);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-size: 0.75rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
            transition: var(--transition-smooth);
        }

        .track-indicator.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .track-indicator svg {
            width: 16px;
            height: 16px;
            fill: var(--accent);
        }

      
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
            transition: var(--transition-smooth);
            transform: translateY(0);
            opacity: 1;
        }

        .control-panel.hidden {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        .controls-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

    
        .control-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .control-group-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-right: 0.5rem;
        }

       
        .btn {
            background: var(--secondary-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
            min-width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.active {
            background: var(--accent);
            color: #0a0a0f;
            border-color: var(--accent);
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            padding: 0;
            border-radius: 50%;
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

      
        .btn-inspire {
            background: linear-gradient(135deg, var(--accent) 0%, #c49a6c 100%);
            color: #0a0a0f;
            border-color: transparent;
            padding: 0.85rem 2rem;
        }

        .btn-inspire:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.3);
        }

        .btn-inspire.active {
            background: var(--success);
        }

        .btn-focus-mode {
            background: rgba(74, 222, 128, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

   
        .timer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 101;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
            width: 0%;
            transition: width 1s linear;
        }

        .focus-exit-hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeInOut 4s ease-in-out infinite;
            pointer-events: none;
        }

        .focus-exit-hint.visible {
            opacity: 1;
            pointer-events: auto;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.7; }
        }

  
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-text {
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

   
        .overlay-controls {
            position: fixed;
            top: 50%;
            right: 2rem;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 50;
            transition: var(--transition-smooth);
        }

        .overlay-controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-slider {
            writing-mode: vertical-lr;
            direction: rtl;
            width: 4px;
            height: 100px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .overlay-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .overlay-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-align: center;
        }

    
        @media (max-width: 768px) {
            .header {
                padding: 1.5rem;
            }

            .brand {
                font-size: 0.85rem;
                letter-spacing: 0.2em;
            }

            .controls-wrapper {
                gap: 1rem;
                padding-bottom: 1rem;
            }

            .control-group-label {
                display: none;
            }

            .btn {
                padding: 0.65rem 1rem;
                font-size: 0.8rem;
            }

            .volume-slider {
                width: 60px;
            }

            .quote-container {
                padding: 2rem;
            }

            .mode-buttons {
                gap: 0.5rem;
            }

            .mode-buttons .btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.7rem;
            }

            .track-indicator {
                top: 4.5rem;
                right: 1rem;
                font-size: 0.65rem;
                padding: 0.5rem 1rem;
            }

            .overlay-controls {
                right: 1rem;
            }

            .overlay-slider {
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .controls-wrapper {
                flex-direction: column;
                gap: 0.75rem;
            }

            .control-group {
                flex-wrap: wrap;
                justify-content: center;
            }

            .quote-text {
                font-size: 1.5rem;
            }
        }

       
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">Loading Inspiration...</div>
    </div>

  
    <div class="video-placeholder" id="videoPlaceholder"></div>
    <div class="video-background" id="videoBackground">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="img/video.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay" id="overlay"></div>

   
    <header class="header" id="header">
        <div class="brand">TOBI TEACHES</div>
        <div class="mode-buttons">
            <button class="btn btn-inspire" id="inspireModeBtn" title="Inspire Mode">
                <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"/></svg>
                <span>Inspire</span>
            </button>
            <button class="btn btn-focus-mode" id="focusModeBtn" title="Focus Mode">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <span>Focus</span>
            </button>
        </div>
    </header>

   
    <div class="track-indicator" id="trackIndicator">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <span id="trackName">Track 1</span>
    </div>

 
    <div class="overlay-controls" id="overlayControls">
        <div class="overlay-label">Dim</div>
        <input type="range" class="overlay-slider" id="overlaySlider" min="20" max="80" value="50" title="Background Darkness">
    </div>

   
    <main class="main-container">
        <div class="quote-container" id="quoteContainer">
            <p class="quote-text" id="quoteText">"The only way to do great work is to love what you do."</p>
            <p class="quote-author" id="quoteAuthor">— Steve Jobs</p>
            <div class="progress-indicator" id="progressIndicator">1 / 300</div>
        </div>
    </main>

  
    <div class="timer-bar" id="timerBar">
        <div class="timer-progress" id="timerProgress"></div>
    </div>

  
    <div class="control-panel" id="controlPanel">
        <div class="controls-wrapper">
     
            <div class="control-group">
                <span class="control-group-label">Quote</span>
                <button class="btn btn-icon" id="prevQuote" title="Previous Quote">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <button class="btn btn-icon" id="nextQuote" title="Next Quote">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
                </button>
                <button class="btn" id="autoModeBtn" title="Auto Rotation">
                    <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                    <span>Auto</span>
                </button>
            </div>

           
            <div class="control-group">
                <span class="control-group-label">Speech</span>
                <button class="btn btn-icon" id="playSpeech" title="Read Quote">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn btn-icon" id="pauseSpeech" title="Pause Speech">
                    <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn btn-icon" id="stopSpeech" title="Stop Speech">
                    <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                </button>
            </div>

            <div class="control-group">
                <span class="control-group-label">Music</span>
                <button class="btn btn-icon" id="prevTrack" title="Previous Track">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5-6l8.5 9-8.5 9V0z"/></svg>
                </button>
                <button class="btn btn-icon" id="playMusicBtn" title="Play/Pause Music">
                    <svg viewBox="0 0 24 24" id="musicIcon"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </button>
                <button class="btn btn-icon" id="nextTrack" title="Next Track">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-9L6 0v18zM16 6v12h2V6h-2z"/></svg>
                </button>
                <div class="volume-control">
                    <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: var(--text-muted);"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" title="Volume">
                    <button class="btn btn-icon" id="muteBtn" title="Mute">
                        <svg viewBox="0 0 24 24" id="muteIcon"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.92 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

   
    <div class="focus-exit-hint" id="focusExitHint">Press ESC or click anywhere to exit Focus Mode</div>

    <audio id="musicPlayer" preload="auto"></audio>

    <script>
      
        const MEDIA_CONFIG = {
           
           musicTracks: [
    { src: 'img/music1.mp3', name: 'Ambient Flow' },
    { src: 'img/music2.mp3', name: 'Peaceful Mind' },
    { src: 'img/music3.mp3', name: 'Inner Calm' },
    { src: 'img/music4.mp3', name: 'Dream State' },
    { src: 'img/music5.mp3', name: 'Serenity' },

    { src: 'img/music6.mp3', name: 'Deep Focus' } 
],
            videoSrc: 'img/video.mp4',
           
            enableVideo: true
        };

      
        const quotes = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },

            { text: "The only person you are destined to become is the person you decide to be.", author: "Ralph Waldo Emerson" },

            { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },

            { text: "Happiness is not something ready made. It comes from your own actions.", author: "Dalai Lama" },

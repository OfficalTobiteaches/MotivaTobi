            { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
            { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford" },
            { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
            { text: "Two roads diverged in a wood, and I took the one less traveled by, and that has made all the difference.", author: "Robert Frost" },
            { text: "If you want to lift yourself up, lift up someone else.", author: "Booker T. Washington" },
            { text: "We may encounter many defeats but we must not be defeated.", author: "Maya Angelou" },
            { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
            { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
            { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
            { text: "Don't judge each day by the harvest you reap but by the seeds that you plant.", author: "Robert Louis Stevenson" },
            { text: "The only thing we have to fear is fear itself.", author: "Franklin D. Roosevelt" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
            { text: "Act as if what you do makes a difference. It does.", author: "William James" },
            { text: "Success is stumbling from failure to failure with no loss of enthusiasm.", author: "Winston Churchill" },
            { text: "What you get by achieving your goals is not as important as what you become by achieving your goals.", author: "Zig Ziglar" },
            { text: "You can't use up creativity. The more you use, the more you have.", author: "Maya Angelou" },
            { text: "Dreams don't work unless you do.", author: "John C. Maxwell" },
            { text: "A person who never made a mistake never tried anything new.", author: "Albert Einstein" },
            { text: "Never limit yourself because of others' limited imagination.", author: "Mae Jemison" },
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "Everything has beauty, but not everyone can see.", author: "Confucius" },
            { text: "How wonderful it is that nobody need wait a single moment before starting to improve the world.", author: "Anne Frank" },
            { text: "Life shrinks or expands in proportion to one's courage.", author: "Anaïs Nin" },
            { text: "The mind is everything. What you think you become.", author: "Buddha" },
            { text: "Happiness is not a goal; it's a by-product.", author: "Eleanor Roosevelt" },
            { text: "You must do the things you think you cannot do.", author: "Eleanor Roosevelt" },
            { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey" },
            { text: "If you look at what you have in life, you'll always have more.", author: "Oprah Winfrey" },
            { text: "The biggest adventure you can take is to live the life of your dreams.", author: "Oprah Winfrey" },
            { text: "Whatever you are, be a good one.", author: "Abraham Lincoln" },
            { text: "I am not a product of my circumstances. I am a product of my decisions.", author: "Stephen R. Covey" },
            { text: "You only live once, but if you do it right, once is enough.", author: "Mae West" },
            { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates" },
            { text: "The journey of a thousand miles begins with one step.", author: "Lao Tzu" },
            { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "If you're going through hell, keep going.", author: "Winston Churchill" },
            { text: "Be yourself; everyone else is already taken.", author: "Oscar Wilde" },
            { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi" },
            { text: "You can't cross the sea merely by standing and staring at the water.", author: "Rabindranath Tagore" },
            { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller" },
            { text: "The only way to predict the future is to create it.", author: "Peter Drucker" },
            { text: "Whatever the mind of man can conceive and believe, it can achieve.", author: "Napoleon Hill" },
            { text: "The best revenge is massive success.", author: "Frank Sinatra" },
            { text: "Quality is not an act, it is a habit.", author: "Aristotle" },
            { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle" },
            { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde" },
            { text: "Darkness cannot drive out darkness; only light can do that.", author: "Martin Luther King Jr." },
            { text: "If you want to be a leader, find a parade and get in front of it.", author: "Jim Rohn" },
            { text: "Life is really simple, but we insist on making it complicated.", author: "Confucius" },
            { text: "Where there is love there is life.", author: "Mahatma Gandhi" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Everything should be made as simple as possible, but not simpler.", author: "Albert Einstein" },
            { text: "The true sign of intelligence is not knowledge but imagination.", author: "Albert Einstein" },
            { text: "Creativity is intelligence having fun.", author: "Albert Einstein" },
            { text: "Weak people revenge. Strong people forgive. Intelligent people ignore.", author: "Tobi Teaches" },
            { text: "A ship is always safe at the shore, but that is not what it is built for.", author: "Albert Einstein" },
            { text: "You can't go back and change the beginning, but you can start where you are and change the ending.", author: "C.S. Lewis" },
            { text: "The more you praise and celebrate your life, the more there is in life to celebrate.", author: "Oprah Winfrey" },
            { text: "Challenges are what make life interesting and overcoming them is what makes life meaningful.", author: "Joshua J. Marine" },
            { text: "We generate fears while we sit. We overcome them by action.", author: "Dr. Ivan Joseph" },
            { text: "If you are not willing to risk the usual, you will have to settle for the ordinary.", author: "Jim Rohn" },
            { text: "All our dreams can come true if we have the courage to pursue them.", author: "Walt Disney" },
            { text: "You have brains in your head. You have feet in your shoes. You can steer yourself any direction you choose.", author: "Dr. Seuss" },
            { text: "It's kind of fun to do the impossible.", author: "Walt Disney" },
            { text: "A person who never made a mistake never tried anything new.", author: "Albert Einstein" },
            { text: "No one can make you feel inferior without your consent.", author: "Eleanor Roosevelt" },
            { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller" },
            { text: "Keep your face always toward the sunshine—and shadows will fall behind you.", author: "Walt Whitman" },
            { text: "The world is a book and those who do not travel read only one page.", author: "Saint Augustine" },
            { text: "You can never cross the ocean until you have the courage to lose sight of the shore.", author: "Christopher Columbus" },
            { text: "Life is 10% what happens to us and 90% how we react to it.", author: "Charles R. Swindoll" },
            { text: "What we think, we become.", author: "Buddha" },
            { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau" },
            { text: "The only place where success comes before work is in the dictionary.", author: "Vidal Sassoon" },
            { text: "If you cannot do great things, do small things in a great way.", author: "Napoleon Hill" },
            { text: "Your work is going to fill a large part of your life, and the only way to be truly satisfied is to do what you believe is great work.", author: "Steve Jobs" },
            { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
            { text: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" },
            { text: "The people crazy enough to think they can change the world usually do.", author: "Steve Jobs" },
            { text: "Quality is more important than quantity. One home run is much better than two doubles.", author: "Steve Jobs" },
            { text: "Don't let yesterday take up too much of today.", author: "Will Rogers" },
            { text: "If you set your goals ridiculously high and it's a failure, you will fail above everyone else's success.", author: "James Cameron" },
            { text: "The successful warrior is the average man, with laser-like focus.", author: "Bruce Lee" },
            { text: "I fear not the man who has practiced 10,000 kicks once, but I fear the man who has practiced one kick 10,000 times.", author: "Bruce Lee" },
            { text: "Empty your mind, be formless. Shapeless, like water.", author: "Bruce Lee" },
            { text: "Knowing is not enough, we must apply. Willing is not enough, we must do.", author: "Bruce Lee" },
            { text: "Mistakes are always forgivable, if one has the courage to admit them.", author: "Bruce Lee" },
            { text: "Be happy in the moment, that's enough. Each moment is all we need, not more.", author: "Mother Teresa" },
            { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa" },
            { text: "Kind words can be short and easy to speak, but their echoes are truly endless.", author: "Mother Teresa" },
            { text: "Peace begins with a smile.", author: "Mother Teresa" },
            { text: "If you judge people, you have no time to love them.", author: "Mother Teresa" },
            { text: "Not all of us can do great things. But we can do small things with great love.", author: "Mother Teresa" },
            { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi" },
            { text: "The wound is the place where the Light enters you.", author: "Rumi" },
            { text: "Don't grieve. Anything you lose comes round in another form.", author: "Rumi" },
            { text: "Raise your words, not voice. It is rain that grows flowers, not thunder.", author: "Rumi" },
            { text: "Let the beauty of what you love be what you do.", author: "Rumi" },
            { text: "Love is the bridge between you and everything.", author: "Rumi" },
            { text: "Respond to every call that excites your spirit.", author: "Rumi" },
            { text: "There is a voice that doesn't use words. Listen.", author: "Rumi" },
            { text: "Be melting snow. Wash yourself of yourself.", author: "Rumi" },
            { text: "Why struggle to open a door between us when the whole wall is an illusion?", author: "Rumi" },
            { text: "Whenever you are alone, remind yourself that God has sent everyone else away so there is only you and Him.", author: "Rumi" },
            { text: "As you start to walk on the way, the way appears.", author: "Rumi" },
            { text: "The only people I would care to be with now are artists and people who have suffered.", author: "F. Scott Fitzgerald" },
            { text: "For what it's worth: it's never too late to be whoever you want to be.", author: "F. Scott Fitzgerald" },
            { text: "I'm not interested in money. I just want to be wonderful.", author: "Andy Warhol" },
            { text: "You have to have confidence in your vision, your ideas, and your execution.", author: "Pharrell Williams" },
            { text: "If you stay positive in a negative situation, you win.", author: "Tobi Teaches" },
            { text: "Your attitude determines your direction.", author: "Tobi Teaches" },
            { text: "Be a voice, not an echo.", author: "Tobi Teaches" },
            { text: "Starve your distractions, feed your focus.", author: "Tobi Teaches" },
            { text: "Don't decrease the goal. Increase the effort.", author: "Tobi Teaches" },
            { text: "Mistakes are proof that you are trying.", author: "Tobi Teaches" },
            { text: "Your speed doesn't matter, forward is forward.", author: "Tobi Teaches" },
            { text: "If you get tired, learn to rest, not to quit.", author: "Banksy" },
            { text: "Be stubborn about your goals and flexible about your methods.", author: "Tobi Teaches" },
            { text: "Work hard in silence, let your success be your noise.", author: "Frank Ocean" },
            { text: "Dream without fear, love without limits.", author: "Tobi Teaches" },
            { text: "The expert in anything was once a beginner.", author: "Helen Hayes" },
            { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
            { text: "The past cannot be changed. The future is in your power.", author: "Tobi Teaches" },
            { text: "Believe in yourself and all that you are. Know that there is something inside you that is greater than any obstacle.", author: "Christian D. Larson" },
            { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
            { text: "Hardships often prepare ordinary people for an extraordinary destiny.", author: "C.S. Lewis" },
            { text: "It is not the mountain we conquer but ourselves.", author: "Edmund Hillary" },
            { text: "Difficult roads often lead to beautiful destinations.", author: "Tobi Teaches" },
            { text: "If you want the rainbow, you have to tolerate the rain.", author: "Tobi Teaches" },
            { text: "Every expert was once a beginner.", author: "Helen Hayes" },
            { text: "Patience is not the ability to wait, but the ability to keep a good attitude while waiting.", author: "Joyce Meyer" },
            { text: "Growth is painful. Change is painful. But nothing is as painful as staying stuck where you do not belong.", author: "N.R. Narayana Murthy" },
            { text: "Success is not about speed, it's about direction.", author: "Tobi Teaches" },
            { text: "Your comfort zone is a beautiful place, but nothing ever grows there.", author: "Tobi Teaches" },
            { text: "Don't be afraid to start over. It's a new chance to rebuild what you want.", author: "Tobi Teaches" },
            { text: "Don't wait for the perfect moment. Take the moment and make it perfect.", author: "Tobi Teaches" },
            { text: "Life begins at the end of your comfort zone.", author: "Neale Donald Walsch" },
            { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
            { text: "You gain strength, courage, and confidence by every experience in which you really stop to look fear in the face.", author: "Eleanor Roosevelt" },
            { text: "Do one thing every day that scares you.", author: "Eleanor Roosevelt" },
            { text: "No one knows what they're doing. Just do it anyway.", author: "Tobi Teaches" },
            { text: "A year from now you may wish you had started today.", author: "Karen Lamb" },
            { text: "The trouble with not having a goal is that you can spend your life running up and down the field and never score.", author: "Bill Copeland" },
            { text: "Discipline is doing what needs to be done, even if you don't want to do it.", author: "Tobi Teaches" },
            { text: "Nobody can go back and start a new beginning, but anyone can start today and make a new ending.", author: "Maria Robinson" },
            { text: "Don't compare your progress with that of others. We all need our own time to travel our own distance.", author: "Tobi Teaches" },
            { text: "One day or day one. You decide.", author: "Tobi Teaches" },
            { text: "When one door of happiness closes, another opens; but often we look so long at the closed door that we do not see the one which has been opened for us.", author: "Helen Keller" },
            { text: "Optimism is the faith that leads to achievement. Nothing can be done without hope and confidence.", author: "Helen Keller" },
            { text: "The most beautiful things in the world cannot be seen or even touched. They must be felt with the heart.", author: "Helen Keller" },
            { text: "Alone we can do so little; together we can do so much.", author: "Helen Keller" },
            { text: "Character cannot be developed in ease and quiet. Only through experience of trial and suffering can the soul be strengthened.", author: "Helen Keller" },
            { text: "The best and most beautiful things in the world cannot be seen or even touched - they must be felt with the heart.", author: "Helen Keller" },
            { text: "I alone cannot change the world, but I can cast a stone across the waters to create many ripples.", author: "Mother Teresa" },
            { text: "Every sunset brings the promise of a new dawn.", author: "Ralph Waldo Emerson" },
            { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson" },
            { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
            { text: "What you do speaks so loudly that I cannot hear what you say.", author: "Ralph Waldo Emerson" },
            { text: "The only way to have a friend is to be one.", author: "Ralph Waldo Emerson" },
            { text: "Happiness is a perfume you cannot pour on others without getting a few drops on yourself.", author: "Ralph Waldo Emerson" },
            { text: "For every minute you are angry you lose sixty seconds of happiness.", author: "Ralph Waldo Emerson" },
            { text: "Though we travel the world over to find the beautiful, we must carry it with us, or we find it not.", author: "Ralph Waldo Emerson" },
            { text: "Make the most of yourself, for that is all there is of you.", author: "Ralph Waldo Emerson" },
            { text: "Life is a succession of lessons which must be lived to be understood.", author: "Ralph Waldo Emerson" },
            { text: "He who is not courageous enough to take risks will accomplish nothing in life.", author: "Muhammad Ali" },
            { text: "Don't count the days. Make the days count.", author: "Muhammad Ali" },
            { text: "Service to others is the rent you pay for your room here on earth.", author: "Muhammad Ali" },
            { text: "I hated every minute of training, but I said, 'Don't quit. Suffer now and live the rest of your life as a champion.'", author: "Muhammad Ali" },
            { text: "Float like a butterfly, sting like a bee.", author: "Muhammad Ali" },
            { text: "Impossible is just a big word thrown around by small men who find it easier to live in the world they've been given.", author: "Muhammad Ali" },
            { text: "Silence is the sleep that nourishes wisdom.", author: "Francis Bacon" },
            { text: "I think, therefore I am.", author: "René Descartes" },
            { text: "The art of being wise is the art of knowing what to overlook.", author: "William James" },
            { text: "No man is an island entire of itself.", author: "John Donne" },
            { text: "To see a World in a Grain of Sand... Hold Infinity in the palm of your hand.", author: "William Blake" },
            { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche" },
            { text: "That which does not kill us makes us stronger.", author: "Friedrich Nietzsche" },
            { text: "He who fights with monsters should look to it that he himself does not become a monster.", author: "Friedrich Nietzsche" },
            { text: "In individuals, insanity is rare; but in groups, parties, nations, and ages, it is the rule.", author: "Friedrich Nietzsche" },
            { text: "There are no facts, only interpretations.", author: "Friedrich Nietzsche" },
            { text: "Sometimes people don't want to hear the truth because they don't want their illusions destroyed.", author: "Friedrich Nietzsche" },
            { text: "The snake which cannot cast its skin has to die. As well the minds which are prevented from changing their opinions.", author: "Friedrich Nietzsche" },
            { text: "We must be ready to let go of the life we planned so as to have the life that is waiting for us.", author: "Joseph Campbell" },
            { text: "Follow your bliss and the universe will open doors for you where there were only walls.", author: "Joseph Campbell" },
            { text: "A hero is someone who has given his or her life to something bigger than oneself.", author: "Joseph Campbell" },
            { text: "We're not on our journey to save the world but to save ourselves.", author: "Joseph Campbell" },
            { text: "The privilege of a lifetime is being who you are.", author: "Joseph Campbell" },
            { text: "Your sacred space is where you can find yourself again and again.", author: "Joseph Campbell" },
            { text: "Life has no meaning unless one lives it with a will, at least to the limit of one's will.", author: "Paul Gauguin" },
            { text: "I shut my eyes in order to see.", author: "Paul Gauguin" },
            { text: "Every failure brings with it the seed of an equivalent success.", author: "Napoleon Hill" },
            { text: "Victory is always possible for the person who refuses to stop fighting.", author: "Napoleon Hill" },
            { text: "First comes thought; then organization of that thought into ideas and plans; then transformation of those plans into reality.", author: "Napoleon Hill" },
            { text: "When your desires are strong enough, you will appear to possess superhuman powers to achieve.", author: "Napoleon Hill" },
            { text: "Most great people have attained their greatest success just one step beyond their greatest failure.", author: "Napoleon Hill" },
            { text: "Edison failed 10,000 times before he made the electric light. Do not be discouraged if you fail a few times.", author: "Napoleon Hill" },
            { text: "No man can succeed in a line of endeavor which he does not like.", author: "Napoleon Hill" },
            { text: "If you cannot do great things, do small things in a great way.", author: "Napoleon Hill" },
            { text: "When defeat comes, accept it as a signal that your plans are not sound, rebuild those plans, and set sail once more toward your coveted goal.", author: "Napoleon Hill" },
            { text: "Faith is the head chemist of the mind.", author: "Napoleon Hill" },
            { text: "The world breaks everyone, and afterward, many are strong at the broken places.", author: "Ernest Hemingway" },
            { text: "The best way to find out if you can trust somebody is to trust them.", author: "Ernest Hemingway" },
            { text: "There is nothing noble in being superior to your fellow man; true nobility is being superior to your former self.", author: "Ernest Hemingway" },
            { text: "Courage is grace under pressure.", author: "Ernest Hemingway" },
            { text: "Live life as if it's your last day. One day you'll be right.", author: "Ernest Hemingway" },
            { text: "In order to write about life first you must live it.", author: "Ernest Hemingway" },
            { text: "All good books are alike in that they are truer than if they had really happened.", author: "Ernest Hemingway" },
            { text: "The greatest enemy will hide in the last place you would ever look.", author: "Julius Caesar" },
            { text: "As a rule, men worry more about what they can't see than about what they can.", author: "Julius Caesar" },
            { text: "Experience is the teacher of all things.", author: "Julius Caesar" },
            { text: "I love the name of honor more than I fear death.", author: "Julius Caesar" },
            { text: "It is easier to find men who will volunteer to die, than to find those who are willing to endure pain with patience.", author: "Julius Caesar" },
            { text: "Which death is preferably to every other? 'The Unexpected'.", author: "Julius Caesar" },
            { text: "Men willingly believe what they wish.", author: "Julius Caesar" },
            { text: "What we wish, we readily believe, and what we ourselves think, we imagine others think also.", author: "Julius Caesar" },
            { text: "In war, events of importance are the result of trivial causes.", author: "Julius Caesar" },
            { text: "The die is cast.", author: "Julius Caesar" },
            { text: "I came, I saw, I conquered.", author: "Julius Caesar" },
            { text: "To be prepared for war is one of the most effectual means of preserving peace.", author: "George Washington" },
            { text: "Liberty, when it begins to take root, is a plant of rapid growth.", author: "George Washington" },
            { text: "Happiness and moral duty are inseparably connected.", author: "George Washington" },
            { text: "Associate with men of good quality if you esteem your own reputation; for it is better to be alone than in bad company.", author: "George Washington" },
            { text: "Worry is the interest paid by those who borrow trouble.", author: "George Washington" },
            { text: "It is better to offer no excuse than a bad one.", author: "George Washington" },
            { text: "We should not look back unless it is to derive useful lessons from past errors, and for the purpose of profiting by dear-bought experience.", author: "George Washington" },
            { text: "Discipline is the soul of an army. It makes small numbers formidable.", author: "George Washington" },
            { text: "Labor to keep alive in your breast that little spark of celestial fire, called conscience.", author: "George Washington" },
            { text: "Observe good faith and justice toward all nations. Cultivate peace and harmony with all.", author: "George Washington" },
            { text: "The price of greatness is responsibility.", author: "Winston Churchill" },
            { text: "We make a living by what we get, but we make a life by what we give.", author: "Winston Churchill" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "Never give in. Never give in. Never, never, never, never—in nothing, great or small, large or petty—never give in, except to convictions of honour and good sense.", author: "Winston Churchill" },
            { text: "Courage is what it takes to stand up and speak; courage is also what it takes to sit down and listen.", author: "Winston Churchill" },
            { text: "Attitude is a little thing that makes a big difference.", author: "Winston Churchill" },
            { text: "If you're going through hell, keep going.", author: "Winston Churchill" },
            { text: "You have enemies? Good. That means you've stood up for something, sometime in your life.", author: "Winston Churchill" },
            { text: "A pessimist sees the difficulty in every opportunity; an optimist sees the opportunity in every difficulty.", author: "Winston Churchill" },
            { text: "Continuous effort—not strength or intelligence—is the key to unlocking our potential.", author: "Winston Churchill" },
            { text: "Democracy is the worst form of government, except for all the others.", author: "Winston Churchill" },
            { text: "Everyone is in favor of free speech. Hardly a day passes without its being extolled, but some people's idea of it is that they are free to say what they like, but if anyone else says anything back, that is an outrage.", author: "Winston Churchill" },
            { text: "I am an optimist. It does not seem too much use being anything else.", author: "Winston Churchill" },
            { text: "We shall defend our island, whatever the cost may be.", author: "Winston Churchill" },
            { text: "There is nothing wrong with change, if it is in the right direction.", author: "Winston Churchill" },
            { text: "However beautiful the strategy, you should occasionally look at the results.", author: "Winston Churchill" },
            { text: "Those who fail to learn from history are condemned to repeat it.", author: "Winston Churchill" },
            { text: "To improve is to change; to be perfect is to change often.", author: "Winston Churchill" },
            { text: "A lie gets halfway around the world before the truth has a chance to get its pants on.", author: "Winston Churchill" },
            { text: "The truth is incontrovertible. Malice may attack it, ignorance may deride it, but in the end, there it is.", author: "Winston Churchill" },
            { text: "Success consists of going from failure to failure without loss of enthusiasm.", author: "Winston Churchill" },
            { text: "History will be kind to me, for I intend to write it.", author: "Winston Churchill" },
            { text: "Education is the most powerful weapon which you can use to change the world.", author: "Nelson Mandela" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
            { text: "Do not judge me by my successes, judge me by how many times I fell down and got back up again.", author: "Nelson Mandela" },
            { text: "A winner is a dreamer who never gives up.", author: "Nelson Mandela" },
            { text: "Difficulties break some men but make others.", author: "Nelson Mandela" },
            { text: "There is no passion to be found playing small—in settling for a life that is less than the one you are capable of living.", author: "Nelson Mandela" },
            { text: "Resentment is like drinking poison and then hoping it will kill your enemies.", author: "Nelson Mandela" },
            { text: "Courage is not the absence of fear—it's inspiring others to move beyond it.", author: "Nelson Mandela" },
            { text: "I learned that courage was not the absence of fear, but the triumph over it.", author: "Nelson Mandela" },
            { text: "For to be free is not merely to cast off one's chains, but to live in a way that respects and enhances the freedom of others.", author: "Nelson Mandela" },
            { text: "No one is born hating another person because of the color of his skin, or his background, or his religion.", author: "Nelson Mandela" },
            { text: "After climbing a great hill, one only finds that there are many more hills to climb.", author: "Nelson Mandela" },
            { text: "Live life as though nobody is watching, and express yourself as though everyone is listening.", author: "Nelson Mandela" },
            { text: "Lead from the back—and let others believe they is in front.", author: "Nelson Mandela" },
            { text: "Fool me once, shame on you. Fool me twice, shame on me.", author: "Chinese Proverb" },
            { text: "A journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "When you have eliminated all which is impossible, then whatever remains, however improbable, must be the truth.", author: "Arthur Conan Doyle" },
            { text: "You cannot cross the sea by merely staring at the water.", author: "Rabindranath Tagore" },
            { text: "Faith is taking the first step even when you don't see the whole staircase.", author: "Martin Luther King Jr." },
            { text: "Faith is the strength by which a shattered world shall emerge into the light.", author: "Helen Keller" },
            { text: "Hate cannot drive out hate; only love can do that.", author: "Martin Luther King Jr." },
            { text: "The time is always right to do what is right.", author: "Martin Luther King Jr." },
            { text: "I have decided to stick with love. Hate is too great a burden to bear.", author: "Martin Luther King Jr." },
            { text: "Life's most persistent and urgent question is: What are you doing for others?", author: "Martin Luther King Jr." },
            { text: "In the end, we will remember not the words of our enemies, but the silence of our friends.", author: "Martin Luther King Jr." },
            { text: "The ultimate measure of a man is not where he stands in moments of comfort and convenience, but where he stands at times of challenge and controversy.", author: "Martin Luther King Jr." },
            { text: "Our lives begin to end the day we become silent about things that matter.", author: "Martin Luther King Jr." },
            { text: "Injustice anywhere is a threat to justice everywhere.", author: "Martin Luther King Jr." },
            { text: "Love is the only force capable of transforming an enemy into friend.", author: "Martin Luther King Jr." },
            { text: "Intelligence plus character—that is the goal of true education.", author: "Martin Luther King Jr." },
            { text: "Nothing in all the world is more dangerous than sincere ignorance and conscientious stupidity.", author: "Martin Luther King Jr." },
            { text: "The art of acceptance is the art of making someone who has just done you a small favor wish that he might have done you a greater one.", author: "Martin Luther King Jr." },
            { text: "We must learn to live together as brothers or perish together as fools.", author: "Martin Luther King Jr." },
            { text: "I am not interested in power for power's sake, but I'm interested in power that is moral, that is right and that is good.", author: "Martin Luther King Jr." },
            { text: "Whatever affects one directly, affects all indirectly.", author: "Martin Luther King Jr." },
            { text: "If you can't fly then run, if you can't run then walk, if you can't walk then crawl, but whatever you do you have to keep moving forward.", author: "Martin Luther King Jr." },
            { text: "Everything that we see is a shadow cast by that which we do not see.", author: "Martin Luther King Jr." },
            { text: "At the center of non-violence stands the principle of love.", author: "Martin Luther King Jr." },
            { text: "Rarely do we find men who willingly engage in hard, solid thinking. There is an almost universal quest for easy answers and half-baked solutions. Nothing pains some people more than having to think.", author: "Martin Luther King Jr." },
            { text: "We must build dikes of courage to hold back the flood of fear.", author: "Martin Luther King Jr." },
            { text: "A man who won't die for something is not fit to live.", author: "Martin Luther King Jr." },
            { text: "The moral arc of the universe bends at the elbow of justice.", author: "Martin Luther King Jr." },
            { text: "He who passively accepts evil is as much involved in it as he who helps to perpetrate it.", author: "Martin Luther King Jr." },
            { text: "We must accept finite disappointment, but never lose infinite hope.", author: "Martin Luther King Jr." },
            { text: "The question is not whether we will be extremists, but what kind of extremists we will be.", author: "Martin Luther King Jr." }
        ];

        
        let state = {
            currentQuoteIndex: 0,
            autoMode: false,
            autoModeTimer: null,
            autoModeInterval: 60000,
            timerStart: 0,
            focusMode: false,
            inspireMode: false,
            speech: {
                synth: window.speechSynthesis,
                utterance: null,
                isSpeaking: false,
                isPaused: false,
                autoSpeak: false
            },
            music: {
                isPlaying: false,
                isMuted: false,
                volume: 0.5,
                currentTrack: 0
            },
            video: {
                isPlaying: true
            },
            overlay: {
                opacity: 0.5
            },
            viewedQuotes: new Set()
        };

    
        const elements = {
            quoteContainer: document.getElementById('quoteContainer'),
            quoteText: document.getElementById('quoteText'),
            quoteAuthor: document.getElementById('quoteAuthor'),
            progressIndicator: document.getElementById('progressIndicator'),
            prevQuote: document.getElementById('prevQuote'),
            nextQuote: document.getElementById('nextQuote'),
            autoModeBtn: document.getElementById('autoModeBtn'),
            playSpeech: document.getElementById('playSpeech'),
            pauseSpeech: document.getElementById('pauseSpeech'),
            stopSpeech: document.getElementById('stopSpeech'),
            playMusicBtn: document.getElementById('playMusicBtn'),
            prevTrack: document.getElementById('prevTrack'),
            nextTrack: document.getElementById('nextTrack'),
            volumeSlider: document.getElementById('volumeSlider'),
            muteBtn: document.getElementById('muteBtn'),
            inspireModeBtn: document.getElementById('inspireModeBtn'),
            focusModeBtn: document.getElementById('focusModeBtn'),
            controlPanel: document.getElementById('controlPanel'),
            timerBar: document.getElementById('timerBar'),
            timerProgress: document.getElementById('timerProgress'),
            focusExitHint: document.getElementById('focusExitHint'),
            loadingScreen: document.getElementById('loadingScreen'),
            header: document.getElementById('header'),
            overlay: document.getElementById('overlay'),
            overlaySlider: document.getElementById('overlaySlider'),
            overlayControls: document.getElementById('overlayControls'),
            trackIndicator: document.getElementById('trackIndicator'),
            trackName: document.getElementById('trackName'),
            videoBackground: document.getElementById('videoBackground'),
            videoPlaceholder: document.getElementById('videoPlaceholder'),
            bgVideo: document.getElementById('bgVideo'),
            musicPlayer: document.getElementById('musicPlayer')
        };

        function initVideo() {
            if (MEDIA_CONFIG.enableVideo && MEDIA_CONFIG.videoSrc) {
                elements.bgVideo.src = MEDIA_CONFIG.videoSrc;
                elements.bgVideo.load();
                elements.bgVideo.play().catch(() => {
                    // Video might not be available, show gradient
                    elements.videoPlaceholder.style.display = 'block';
                });
            } else {
                elements.videoBackground.style.display = 'none';
                elements.videoPlaceholder.style.display = 'block';
            }
        }

      
        function loadTrack(index) {
            state.music.currentTrack = index;
            const track = MEDIA_CONFIG.musicTracks[index];
            elements.musicPlayer.src = track.src;
            elements.trackName.textContent = track.name;

            if (state.music.isPlaying) {
                elements.musicPlayer.play().catch(err => {
                    console.log('Track playback failed:', err);
                });
            }
        }

        function playMusic() {
            elements.musicPlayer.play().then(() => {
                state.music.isPlaying = true;
                elements.playMusicBtn.classList.add('active');
                updateMusicIcon();
            }).catch(err => {
                console.log('Music playback failed:', err);
            });
        }

        function pauseMusic() {
            elements.musicPlayer.pause();
            state.music.isPlaying = false;
            elements.playMusicBtn.classList.remove('active');
            updateMusicIcon();
        }

        function toggleMusic() {
            if (state.music.isPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        }

        function nextTrack() {
            const nextIndex = (state.music.currentTrack + 1) % MEDIA_CONFIG.musicTracks.length;
            loadTrack(nextIndex);
        }

        function prevTrack() {
            const prevIndex = (state.music.currentTrack - 1 + MEDIA_CONFIG.musicTracks.length) % MEDIA_CONFIG.musicTracks.length;
            loadTrack(prevIndex);
        }

        function setVolume(value) {
            state.music.volume = value / 100;
            if (!state.music.isMuted) {
                elements.musicPlayer.volume = state.music.volume;
            }
        }

        function toggleMute() {
            state.music.isMuted = !state.music.isMuted;
            elements.musicPlayer.muted = state.music.isMuted;
            elements.muteBtn.classList.toggle('active', state.music.isMuted);
            updateMuteIcon();
        }

        function updateMusicIcon() {
            const icon = document.getElementById('musicIcon');
            if (state.music.isPlaying) {
                icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                icon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>';
            }
        }

        function updateMuteIcon() {
            const icon = document.getElementById('muteIcon');
            if (state.music.isMuted) {
                icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.92 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
            } else {
                icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
            }
        }

  
        function setupMusicPlayerEvents() {
            elements.musicPlayer.addEventListener('ended', () => {
                nextTrack();
            });

            elements.musicPlayer.addEventListener('error', () => {
                console.log('Track not found, trying next...')
                const nextIndex = (state.music.currentTrack + 1) % MEDIA_CONFIG.musicTracks.length;
                if (nextIndex !== state.music.currentTrack) {
                    loadTrack(nextIndex);
                }
            });
        }

        function setOverlayOpacity(value) {
            state.overlay.opacity = value / 100;
            elements.overlay.style.background = `rgba(0, 0, 0, ${state.overlay.opacity})`;
        }

     
        function getRandomQuoteIndex() {
            if (state.viewedQuotes.size >= quotes.length) {
                state.viewedQuotes.clear();
            }

            let index;
            do {
                index = Math.floor(Math.random() * quotes.length);
            } while (state.viewedQuotes.has(index));

            state.viewedQuotes.add(index);
            return index;
        }

        function displayQuote(index, animate = true) {
            const quote = quotes[index];

            if (animate) {
                elements.quoteContainer.classList.add('fade-out');
                setTimeout(() => {
                    elements.quoteText.textContent = `"${quote.text}"`;
                    elements.quoteAuthor.textContent = `— ${quote.author}`;
                    elements.progressIndicator.textContent = `${index + 1} / ${quotes.length}`;
                    elements.quoteContainer.classList.remove('fade-out');
                }, 300);
            } else {
                elements.quoteText.textContent = `"${quote.text}"`;
                elements.quoteAuthor.textContent = `— ${quote.author}`;
                elements.progressIndicator.textContent = `${index + 1} / ${quotes.length}`;
            }
        }

        function nextQuote() {
            stopSpeech();
            state.currentQuoteIndex = getRandomQuoteIndex();
            displayQuote(state.currentQuoteIndex);

            if (state.speech.autoSpeak) {
                setTimeout(() => speakQuote(), 400);
            }

            resetAutoModeTimer();
        }

        function prevQuote() {
            stopSpeech();
            state.currentQuoteIndex = state.currentQuoteIndex > 0 ? state.currentQuoteIndex - 1 : quotes.length - 1;
            displayQuote(state.currentQuoteIndex);

            if (state.speech.autoSpeak) {
                setTimeout(() => speakQuote(), 400);
            }

            resetAutoModeTimer();
        }

        
        function startAutoMode() {
            state.autoMode = true;
            elements.autoModeBtn.classList.add('active');
            elements.timerBar.style.display = 'block';
            startTimerProgress();

            state.autoModeTimer = setInterval(() => {
                nextQuote();
            }, state.autoModeInterval);
        }

        function stopAutoMode() {
            state.autoMode = false;
            elements.autoModeBtn.classList.remove('active');
            elements.timerProgress.style.width = '0%';
            clearInterval(state.autoModeTimer);
        }

        function toggleAutoMode() {
            if (state.autoMode) {
                stopAutoMode();
            } else {
                startAutoMode();
            }
        }

        function resetAutoModeTimer() {
            if (state.autoMode) {
                clearInterval(state.autoModeTimer);
                startTimerProgress();
                state.autoModeTimer = setInterval(() => {
                    nextQuote();
                }, state.autoModeInterval);
            }
        }

        function startTimerProgress() {
            state.timerStart = Date.now();
            const animateTimer = () => {
                if (!state.autoMode) return;

                const elapsed = Date.now() - state.timerStart;
                const progress = Math.min((elapsed / state.autoModeInterval) * 100, 100);
                elements.timerProgress.style.width = `${progress}%`;

                if (progress < 100) {
                    requestAnimationFrame(animateTimer);
                }
            };
            requestAnimationFrame(animateTimer);
        }

     
        function speakQuote() {
            if (!state.speech.synth) {
                console.warn('Speech synthesis not supported');
                return;
            }

            stopSpeech();

            const quote = quotes[state.currentQuoteIndex];
            const text = `${quote.text}. — ${quote.author}`;

            state.speech.utterance = new SpeechSynthesisUtterance(text);
            state.speech.utterance.rate = 0.9;
            state.speech.utterance.pitch = 1;
            state.speech.utterance.volume = 1;

          
            if (state.music.isPlaying && !state.music.isMuted) {
                elements.musicPlayer.volume = state.music.volume * 0.3;
            }

            state.speech.utterance.onend = () => {
                state.speech.isSpeaking = false;
                elements.playSpeech.classList.remove('active');
                if (state.music.isPlaying && !state.music.isMuted) {
                    elements.musicPlayer.volume = state.music.volume;
                }
            };

            state.speech.utterance.onerror = () => {
                state.speech.isSpeaking = false;
                elements.playSpeech.classList.remove('active');
            };

            state.speech.synth.speak(state.speech.utterance);
            state.speech.isSpeaking = true;
            elements.playSpeech.classList.add('active');
        }

        function pauseSpeech() {
            if (state.speech.synth && state.speech.isSpeaking) {
                state.speech.synth.pause();
                state.speech.isPaused = true;
                elements.pauseSpeech.classList.add('active');
            }
        }

        function resumeSpeech() {
            if (state.speech.synth && state.speech.isPaused) {
                state.speech.synth.resume();
                state.speech.isPaused = false;
                elements.pauseSpeech.classList.remove('active');
            }
        }

        function stopSpeech() {
            if (state.speech.synth) {
                state.speech.synth.cancel();
            }
            state.speech.isSpeaking = false;
            state.speech.isPaused = false;
            elements.playSpeech.classList.remove('active');
            elements.pauseSpeech.classList.remove('active');

            if (state.music.isPlaying && !state.music.isMuted) {
                elements.musicPlayer.volume = state.music.volume;
            }
        }

        function toggleSpeech() {
            if (state.speech.isSpeaking && !state.speech.isPaused) {
                pauseSpeech();
            } else if (state.speech.isPaused) {
                resumeSpeech();
            } else {
                speakQuote();
            }
        }

        function startInspireMode() {
            state.inspireMode = true;
            state.speech.autoSpeak = true;
            elements.inspireModeBtn.classList.add('active');

            if (!state.autoMode) {
                startAutoMode();
            }

            if (!state.music.isPlaying) {
                playMusic();
            }

            setTimeout(() => speakQuote(), 500);
        }

        function stopInspireMode() {
            state.inspireMode = false;
            state.speech.autoSpeak = false;
            elements.inspireModeBtn.classList.remove('active');
            stopSpeech();
        }

        function toggleInspireMode() {
            if (state.inspireMode) {
                stopInspireMode();
            } else {
                startInspireMode();
            }
        }

        function startFocusMode() {
            state.focusMode = true;
            elements.controlPanel.classList.add('hidden');
            elements.header.classList.add('hidden');
            elements.timerBar.style.display = 'none';
            elements.trackIndicator.classList.add('hidden');
            elements.overlayControls.classList.add('hidden');
            elements.focusExitHint.classList.add('visible');

            setTimeout(() => {
                elements.focusExitHint.classList.remove('visible');
            }, 4000);
        }

        function stopFocusMode() {
            state.focusMode = false;
            elements.controlPanel.classList.remove('hidden');
            elements.header.classList.remove('hidden');
            elements.trackIndicator.classList.remove('hidden');
            elements.overlayControls.classList.remove('hidden');
            if (state.autoMode) {
                elements.timerBar.style.display = 'block';
            }
        }

        function toggleFocusMode() {
            if (state.focusMode) {
                stopFocusMode();
            } else {
                stopSpeech();
                stopInspireMode();
                startFocusMode();
            }
        }

      
        function setupEventListeners() {
       
            elements.prevQuote.addEventListener('click', prevQuote);
            elements.nextQuote.addEventListener('click', nextQuote);
            elements.autoModeBtn.addEventListener('click', toggleAutoMode);

    
            elements.playSpeech.addEventListener('click', toggleSpeech);
            elements.pauseSpeech.addEventListener('click', () => {
                if (state.speech.isPaused) {
                    resumeSpeech();
                } else {
                    pauseSpeech();
                }
            });
            elements.stopSpeech.addEventListener('click', stopSpeech);

            elements.playMusicBtn.addEventListener('click', toggleMusic);
            elements.prevTrack.addEventListener('click', prevTrack);
            elements.nextTrack.addEventListener('click', nextTrack);
            elements.volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));
            elements.muteBtn.addEventListener('click', toggleMute);

            elements.inspireModeBtn.addEventListener('click', toggleInspireMode);
            elements.focusModeBtn.addEventListener('click', toggleFocusMode);

            elements.overlaySlider.addEventListener('input', (e) => setOverlayOpacity(e.target.value));

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && state.focusMode) {
                    stopFocusMode();
                }
            });

            document.addEventListener('click', (e) => {
                if (state.focusMode && !e.target.closest('.main-container')) {
                    stopFocusMode();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (state.focusMode) return;

                switch(e.key) {
                    case 'ArrowRight':
                        nextQuote();
                        break;
                    case 'ArrowLeft':
                        prevQuote();
                        break;
                    case ' ':
                        e.preventDefault();
                        toggleAutoMode();
                        break;
                    case 's':
                        toggleSpeech();
                        break;
                    case 'm':
                        toggleMusic();
                        break;
                    case 'n':
                        nextTrack();
                        break;
                    case 'p':
                        prevTrack();
                        break;
                    case 'i':
                        toggleInspireMode();
                        break;
                    case 'f':
                        toggleFocusMode();
                        break;
                }
            });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (state.autoMode) {
                        clearInterval(state.autoModeTimer);
                    }
                } else {
                    if (state.autoMode) {
                        resetAutoModeTimer();
                    }
                }
            });
        }

        function init() {
       
            initVideo();

            setupMusicPlayerEvents();
            loadTrack(0);
            elements.musicPlayer.volume = state.music.volume;

           
            setOverlayOpacity(elements.overlaySlider.value);

         
            state.currentQuoteIndex = getRandomQuoteIndex();
            displayQuote(state.currentQuoteIndex, false);

           
            setupEventListeners();

         
            setTimeout(() => {
                elements.loadingScreen.classList.add('hidden');
            }, 1000);

       
            if (!window.speechSynthesis) {
                elements.playSpeech.disabled = true;
                elements.pauseSpeech.disabled = true;
                elements.stopSpeech.disabled = true;
            }
        }

        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
